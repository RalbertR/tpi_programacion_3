<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos - Panel Admin</title>
</head>

<body>
  <header class="store-header" id="header"></header>

  <div class="admin-layout">
    <nav class="admin-sidebar" id="adminSidebar"></nav>

    <div class="admin-content">
      <div class="admin-content-header">
        <h2>Gestion de Productos</h2>
        <button id="btnNuevo" type="button">+ Nuevo Producto</button>
      </div>

      <div class="admin-section">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Imagen</th>
              <th>Nombre</th>
              <th>Precio</th>
              <th>Categoria</th>
              <th>Stock</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay oculto">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitulo"></h3>
        <button id="modalClose" class="modal-close" type="button">&times;</button>
      </div>
      <form id="productoForm" class="admin-form">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" required />
        </div>
        <div class="form-group">
          <label for="precio">Precio</label>
          <input type="number" id="precio" min="0.01" step="0.01" required />
        </div>
        <div class="form-group">
          <label for="stock">Stock</label>
          <input type="number" id="stock" min="0" step="1" required />
        </div>
        <div class="form-group">
          <label for="categoria">Categoria</label>
          <select id="categoria" required></select>
        </div>
        <div class="form-group full">
          <label for="descripcion">Descripcion</label>
          <input type="text" id="descripcion" required />
        </div>
        <div class="form-group full">
          <label for="imagen">URL de Imagen</label>
          <input type="text" id="imagen" placeholder="https://ejemplo.com/imagen.jpg" required />
        </div>
        <div class="form-group">
          <label for="disponible">
            <input type="checkbox" id="disponible" style="width: auto;" checked />
            Producto disponible
          </label>
        </div>
        <p id="formError" class="form-error full"></p>
        <button type="submit" class="login-button">Guardar</button>
      </form>
    </div>
  </div>

  <script type="module" src="./products.ts"></script>
</body>

</html>
