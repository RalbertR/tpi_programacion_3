<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesion - Food Store</title>
</head>

<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <h1 class="brand">Food Store</h1>
        <p class="subtitle">Iniciar Sesion</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="mail">Email</label>
          <input type="email" id="mail" placeholder="ejemplo@correo.com" required />
        </div>

        <div class="form-group">
          <label for="password">Contrasena</label>
          <input type="password" id="password" placeholder="Ingrese su contrasena" required />
        </div>

        <p id="errorMsg" class="form-error"></p>

        <button type="submit" class="login-button">Ingresar</button>
      </form>

      <p class="register-link">
        Aun no tenes cuenta? <a href="../register/register.html">Registrate</a>
      </p>

      <div class="demo-credentials">
        <p><strong>Admin:</strong> admin@food.com / admin123</p>
        <p><strong>Cliente:</strong> cliente@food.com / cliente123</p>
      </div>
    </div>
  </div>

  <script type="module" src="./login.ts"></script>
</body>

</html>
