<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito - Food Store</title>
</head>

<body>
  <header class="store-header" id="header"></header>

  <main class="cart-page">
    <div class="cart-header">
      <h2 class="cart-title">Mi Carrito</h2>
      <button id="btnVaciar" class="btn-vaciar">Vaciar carrito</button>
    </div>

    <div id="cartContainer" class="cart-list"></div>
    <div id="totalContainer" class="cart-total"></div>

    <div id="checkoutSection" class="admin-section oculto">
      <h3>Completar pedido</h3>
      <form id="checkoutForm" class="login-form">
        <div class="form-group">
          <label for="telefono">Telefono</label>
          <input type="tel" id="telefono" placeholder="Ej: 1122334455" required />
        </div>

        <div class="form-group">
          <label for="formaPago">Forma de pago</label>
          <select id="formaPago" required>
            <option value="TARJETA">Tarjeta</option>
            <option value="TRANSFERENCIA">Transferencia</option>
            <option value="EFECTIVO">Efectivo</option>
          </select>
        </div>

        <p id="checkoutError" class="form-error"></p>

        <button type="submit" class="login-button">Confirmar pedido</button>
      </form>
    </div>
  </main>

  <script type="module" src="./cart.ts"></script>
</body>

</html>
